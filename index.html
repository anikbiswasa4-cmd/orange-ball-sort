<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orange Ball Sort</title>
    <script src="https://cdn.jsdelivr.net/npm/@orange-web3/sdk/dist/index.min.js"></script>
    <style>
        :root { --orange: #ff6a00; --bg: #080a0c; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px 0; min-height: 100vh; touch-action: manipulation; }
        
        .brand-header { text-align: center; margin-top: 10px; }
        .brand-header h1 { color: var(--orange); font-size: 26px; margin: 0; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .level-display { color: #aaa; font-size: 14px; margin-top: 5px; letter-spacing: 1px; }

        .timer-container { background: #111; border: 2px solid var(--orange); padding: 10px 45px; border-radius: 50px; margin: 20px 0; font-size: 26px; font-weight: bold; color: var(--orange); box-shadow: 0 0 15px rgba(255, 106, 0, 0.3); }

        .tube-container { display: flex; gap: 8px; padding: 15px; justify-content: center; min-height: 170px; flex-wrap: wrap; max-width: 360px; }
        .tube { width: 42px; height: 155px; background: var(--glass); border: 2px solid #fff; border-top: none; border-radius: 0 0 25px 25px; display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .tube.selected { border-color: var(--orange); transform: translateY(-8px); box-shadow: 0 5px 15px rgba(255, 106, 0, 0.3); }
        
        .ball { width: 36px; height: 36px; border-radius: 50%; margin-bottom: 3px; box-shadow: inset -4px -4px 8px rgba(0,0,0,0.5); position: relative; }
        .ball::after { content: ''; position: absolute; top: 15%; left: 20%; width: 10px; height: 10px; background: rgba(255,255,255,0.3); border-radius: 50%; }

        .controls { display: flex; gap: 15px; margin: 20px 0 40px 0; }
        .btn { padding: 14px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
        .btn-reset { background: #333; color: white; }
        .btn-orange { background: linear-gradient(45deg, #ff6a00, #ee0979); color: white; box-shadow: 0 4px 12px rgba(255, 106, 0, 0.4); }

        /* লিডারবোর্ড আপডেট */
        .leaderboard-section { width: 85%; max-width: 320px; background: #161616; border-radius: 20px; border: 1px solid #333; padding: 20px; margin-top: auto; text-align: center; }
        .lb-title { color: var(--orange); font-size: 16px; margin-bottom: 15px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .sync-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #666; font-size: 13px; }
        .spinner { width: 22px; height: 22px; border: 2px solid rgba(255, 106, 0, 0.1); border-top: 2px solid var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .no-score-text { color: #888; font-style: italic; letter-spacing: 0.5px; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="brand-header">
        <h1>ORANGE BALL SORT</h1>
        <div class="level-display" id="level-text">LEVEL: 1</div>
    </header>
    
    <div class="timer-container" id="timer">05:00</div>
    
    <div class="tube-container" id="board"></div>
    
    <div class="controls">
        <button class="btn btn-reset" onclick="resetCurrentLevel()">Restart</button>
        <button class="btn btn-orange" onclick="nextLevelAction()">New Game</button>
    </div>

    <div class="leaderboard-section">
        <div class="lb-title">LEADERBOARD</div>
        <div class="sync-box">
            <div class="spinner"></div>
            <span class="no-score-text">No scores yet. Be the first!</span>
        </div>
    </div>

    <script>
        const CONFIG = { apiKey: "5b75cfdb421a4a7798551a3292bdd6e2", projectId: "orangeid-xBDHuRku1r" };
        let tubes = [], initialTubes = [], selectedIdx = null, timeLeft = 300, timer = null, active = false;
        let currentLevel = 1;
        
        const ALL_COLORS = ['#FF3B30', '#4CD964', '#007AFF', '#FFCC00', '#AF52DE', '#FF9500', '#00FFFF', '#E91E63'];

        window.onload = () => { if(window.orange) orange.init(CONFIG); generateLevel(currentLevel); };

        function generateLevel(lv) {
            document.getElementById('level-text').innerText = `LEVEL: ${lv}`;
            let colorCount = Math.min(lv + 3, 8); 
            let activeColors = ALL_COLORS.slice(0, colorCount);
            
            let balls = []; 
            activeColors.forEach(c => { for(let i=0; i<4; i++) balls.push(c); });
            
            for (let i = balls.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [balls[i], balls[j]] = [balls[j], balls[i]];
            }

            let tubeCount = colorCount + 2; 
            tubes = Array.from({ length: tubeCount }, () => []);
            
            for(let i=0; i < colorCount; i++) {
                for(let j=0; j<4; j++) tubes[i].push(balls.pop());
            }
            initialTubes = JSON.parse(JSON.stringify(tubes));
            startGame();
        }

        function nextLevelAction() {
            currentLevel = 1;
            generateLevel(currentLevel);
        }

        function resetCurrentLevel() { tubes = JSON.parse(JSON.stringify(initialTubes)); startGame(); }

        function startGame() {
            selectedIdx = null; timeLeft = 300; active = true;
            clearInterval(timer); startTimer(); render();
        }

        function startTimer() {
            timer = setInterval(() => {
                if(timeLeft <= 0) { 
                    clearInterval(timer); 
                    active = false; 
                    alert("Try Again!"); 
                    currentLevel = 1; 
                    generateLevel(currentLevel); 
                    return; 
                }
                timeLeft--; 
                let m = Math.floor(timeLeft/60).toString().padStart(2,'0'), s = (timeLeft%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function render() {
            const b = document.getElementById('board'); b.innerHTML = '';
            tubes.forEach((t, i) => {
                const d = document.createElement('div');
                d.className = `tube ${selectedIdx === i ? 'selected' : ''}`;
                d.onpointerdown = (e) => { e.preventDefault(); if(active) handleMove(i); };
                t.forEach(c => {
                    const bl = document.createElement('div'); 
                    bl.className = 'ball'; 
                    bl.style.background = `radial-gradient(circle at 30% 30%, ${c}, #000)`;
                    d.appendChild(bl);
                });
                b.appendChild(d);
            });
        }

        function handleMove(i) {
            if(selectedIdx === null) { if(tubes[i].length > 0) selectedIdx = i; }
            else {
                if(selectedIdx !== i) {
                    let ball = tubes[selectedIdx][tubes[selectedIdx].length-1], target = tubes[i];
                    if(target.length < 4 && (target.length === 0 || target[target.length-1] === ball)) {
                        target.push(tubes[selectedIdx].pop()); selectedIdx = null; checkWin();
                    } else { selectedIdx = i; }
                } else { selectedIdx = null; }
            } render();
        }

        function checkWin() {
            const win = tubes.every(t => t.length === 0 || (t.length === 4 && t.every(b => b === t[0])));
            if(win) {
                active = false; clearInterval(timer);
                if(window.orange) orange.submitScore(300 - timeLeft);
                setTimeout(() => { 
                    alert(`Level ${currentLevel} Cleared! Next Level Loading...`);
                    currentLevel++; 
                    generateLevel(currentLevel);
                }, 300);
            }
        }
    </script>
</body>
</html>
