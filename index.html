<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orange Ball Sort - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@orange-web3/sdk/dist/index.min.js"></script>
    <style>
        :root { --orange: #ff6a00; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        .timer-display { font-size: 28px; font-weight: bold; color: var(--orange); margin-bottom: 20px; background: #1a1a1a; padding: 10px 30px; border-radius: 50px; border: 2px solid var(--orange); box-shadow: 0 0 15px rgba(255, 106, 0, 0.4); }
        
        .tube-container { display: flex; gap: 10px; padding: 10px; justify-content: center; flex-wrap: nowrap; }
        
        .tube { width: 45px; height: 160px; border: 3px solid #fff; border-top: none; border-radius: 0 0 25px 25px; display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 5px; cursor: pointer; transition: 0.2s; position: relative; }
        .tube.selected { border-color: var(--orange); transform: translateY(-15px); box-shadow: 0 10px 20px rgba(255, 106, 0, 0.2); }
        
        .ball { width: 38px; height: 38px; border-radius: 50%; margin-bottom: 3px; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4); }
        
        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; min-width: 110px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-reset { background: transparent; color: #fff; border: 1px solid #444; }
        .btn-orange { background: linear-gradient(45deg, #ff6a00, #ee0979); color: white; box-shadow: 0 4px 15px rgba(255, 106, 0, 0.3); }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        #game-screen { text-align: center; display: block; }
    </style>
</head>
<body>

    <div id="game-screen">
        <h2 style="color: var(--orange); margin-bottom: 15px; font-weight: normal; opacity: 0.8; letter-spacing: 2px;">ORANGE BALL SORT</h2>
        <div class="timer-display" id="timer">05:00</div>
        <div class="tube-container" id="board"></div>
        <div class="controls">
            <button class="btn btn-reset" onclick="resetCurrentLevel()">Restart</button>
            <button class="btn btn-orange" onclick="generateNewLevel()">New Game</button>
        </div>
    </div>

    <script>
        const ORANGE_CONFIG = {
            apiKey: "5b75cfdb421a4a7798551a3292bdd6e2",
            projectId: "orangeid-xBDHuRku1r"
        };

        let tubes = [];
        let initialTubesState = []; // রিসেট করার জন্য লেভেলের কপি রাখা
        let selectedIdx = null;
        let timeLeft = 300; 
        let timerInterval = null;
        let gameActive = false;

        const COLORS = ['#FF3B30', '#4CD964', '#007AFF', '#FFCC00'];

        window.onload = function() {
            if (typeof orange !== 'undefined') orange.init(ORANGE_CONFIG);
            generateNewLevel();
        };

        // একদম নতুন লেভেল তৈরি করা (এলোমেলোভাবে)
        function generateNewLevel() {
            let allBalls = [];
            COLORS.forEach(color => {
                for(let i=0; i<4; i++) allBalls.push(color);
            });

            // বলগুলো এলোমেলো করা (Fisher-Yates Shuffle)
            for (let i = allBalls.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allBalls[i], allBalls[j]] = [allBalls[j], allBalls[i]];
            }

            tubes = [[], [], [], [], [], []];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    tubes[i].push(allBalls.pop());
                }
            }
            
            // বর্তমান লেভেলের একটি কপি রাখা যাতে Restart বাটন কাজ করে
            initialTubesState = JSON.parse(JSON.stringify(tubes));
            startNewGameSession();
        }

        // বর্তমান লেভেলটিকেই শুরু থেকে খেলা
        function resetCurrentLevel() {
            tubes = JSON.parse(JSON.stringify(initialTubesState));
            startNewGameSession();
        }

        function startNewGameSession() {
            selectedIdx = null;
            timeLeft = 300;
            gameActive = true;
            clearInterval(timerInterval);
            updateTimerDisplay();
            startTimer();
            render();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameActive = false;
                    alert("Time Up! Try a new challenge.");
                    generateNewLevel();
                    return;
                }
                timeLeft--;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            tubes.forEach((tube, index) => {
                const div = document.createElement('div');
                div.className = `tube ${selectedIdx === index ? 'selected' : ''}`;
                div.addEventListener('pointerdown', (e) => {
                    if (!gameActive) return;
                    e.preventDefault();
                    handleMove(index);
                });
                tube.forEach(color => {
                    const ball = document.createElement('div');
                    ball.className = 'ball';
                    ball.style.backgroundColor = color;
                    div.appendChild(ball);
                });
                board.appendChild(div);
            });
        }

        function handleMove(idx) {
            if (selectedIdx === null) {
                if (tubes[idx].length > 0) selectedIdx = idx;
            } else {
                if (selectedIdx !== idx) {
                    const ball = tubes[selectedIdx][tubes[selectedIdx].length - 1];
                    const target = tubes[idx];
                    if (target.length < 4 && (target.length === 0 || target[target.length - 1] === ball)) {
                        target.push(tubes[selectedIdx].pop());
                        selectedIdx = null;
                        checkWin();
                    } else {
                        selectedIdx = idx;
                    }
                } else {
                    selectedIdx = null;
                }
            }
            render();
        }

        function checkWin() {
            const win = tubes.every(t => t.length === 0 || (t.length === 4 && t.every(b => b === t[0])));
            if (win) {
                gameActive = false;
                clearInterval(timerInterval);
                setTimeout(() => alert("Level Complete! You solved the puzzle!"), 300);
            }
        }
    </script>
</body>
</html>
