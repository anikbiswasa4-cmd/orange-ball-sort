<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orange Ball Sort - Hard Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/@orange-web3/sdk/dist/index.min.js"></script>
    <style>
        :root { --orange: #ff6a00; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px 0; min-height: 100vh; touch-action: manipulation; }
        
        /* টাইটেল এবং টাইমার */
        .timer-display { font-size: 26px; font-weight: bold; color: var(--orange); background: #1a1a1a; padding: 8px 35px; border-radius: 50px; border: 2px solid var(--orange); margin: 15px 0; box-shadow: 0 0 15px rgba(255, 106, 0, 0.3); }
        
        /* গেম বোর্ড (কঠিন লেভেলের জন্য সাইজ অ্যাডজাস্ট করা) */
        .tube-container { display: flex; gap: 6px; padding: 15px; justify-content: center; min-height: 170px; flex-wrap: wrap; max-width: 360px; }
        .tube { width: 38px; height: 145px; border: 2px solid #fff; border-top: none; border-radius: 0 0 20px 20px; display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 5px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.05); }
        .tube.selected { border-color: var(--orange); transform: translateY(-8px); box-shadow: 0 5px 15px rgba(255, 106, 0, 0.3); }
        .ball { width: 32px; height: 32px; border-radius: 50%; margin-bottom: 2px; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.4); }
        
        /* বাটন */
        .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 60px; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
        .btn-reset { background: #333; color: white; }
        .btn-orange { background: linear-gradient(45deg, #ff6a00, #ee0979); color: white; box-shadow: 0 4px 12px rgba(255, 106, 0, 0.4); }

        /* একদম নিচে লিডারবোর্ড সেকশন */
        .leaderboard-section { width: 85%; max-width: 320px; background: #161616; border-radius: 20px; border: 1px solid #333; padding: 20px; margin-top: auto; }
        .lb-title { color: var(--orange); font-size: 16px; text-align: center; margin-bottom: 15px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* অরেঞ্জ লোডিং স্পিনার */
        .loading-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px 0; }
        .spinner { width: 28px; height: 28px; border: 3px solid rgba(255, 106, 0, 0.1); border-top: 3px solid var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        .loading-text { color: #666; font-size: 12px; letter-spacing: 1px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2 style="color: var(--orange); margin: 0; letter-spacing: 3px; font-weight: normal; opacity: 0.9;">ORANGE BALL SORT</h2>
    
    <div class="timer-display" id="timer">05:00</div>
    
    <div class="tube-container" id="board"></div>
    
    <div class="controls">
        <button class="btn btn-reset" onclick="resetCurrentLevel()">Restart</button>
        <button class="btn btn-orange" onclick="generateNewLevel()">New Game</button>
    </div>

    <div class="leaderboard-section">
        <div class="lb-title">LEADERBOARD</div>
        <div class="loading-box">
            <div class="spinner"></div>
            <div class="loading-text">SYNCING WITH ORANGE...</div>
        </div>
    </div>

    <script>
        const ORANGE_CONFIG = { apiKey: "5b75cfdb421a4a7798551a3292bdd6e2", projectId: "orangeid-xBDHuRku1r" };
        let tubes = [], initialTubes = [], selectedIdx = null, timeLeft = 300, timer = null, active = false;
        
        // কঠিন মোড: ৬টি রঙের বল (অরেঞ্জ নিয়মে জটিলতা বাড়ানো হয়েছে)
        const COLORS = ['#FF3B30', '#4CD964', '#007AFF', '#FFCC00', '#AF52DE', '#FF9500'];

        window.onload = () => { if(window.orange) orange.init(ORANGE_CONFIG); generateNewLevel(); };

        function generateNewLevel() {
            let balls = []; 
            COLORS.forEach(c => { for(let i=0; i<4; i++) balls.push(c); });
            
            // কঠিন করার জন্য বেশি বার এলোমেলো করা (Fisher-Yates)
            for (let i = balls.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [balls[i], balls[j]] = [balls[j], balls[i]];
            }

            // ৮টি টিউব (৬টিতে বল থাকবে, ২টি খালি থাকবে অরেঞ্জ নিয়ম অনুযায়ী)
            tubes = [[], [], [], [], [], [], [], []];
            for(let i=0; i<6; i++) {
                for(let j=0; j<4; j++) tubes[i].push(balls.pop());
            }
            initialTubes = JSON.parse(JSON.stringify(tubes));
            startGame();
        }

        function resetCurrentLevel() { tubes = JSON.parse(JSON.stringify(initialTubes)); startGame(); }

        function startGame() {
            selectedIdx = null; timeLeft = 300; active = true;
            clearInterval(timer); startTimer(); render();
        }

        function startTimer() {
            timer = setInterval(() => {
                if(timeLeft <= 0) { clearInterval(timer); active = false; alert("Time Over!"); generateNewLevel(); return; }
                timeLeft--; 
                let m = Math.floor(timeLeft/60).toString().padStart(2,'0'), s = (timeLeft%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function render() {
            const b = document.getElementById('board'); b.innerHTML = '';
            tubes.forEach((t, i) => {
                const d = document.createElement('div');
                d.className = `tube ${selectedIdx === i ? 'selected' : ''}`;
                d.onpointerdown = (e) => { e.preventDefault(); if(active) handleMove(i); };
                t.forEach(c => {
                    const bl = document.createElement('div'); bl.className = 'ball'; bl.style.backgroundColor = c;
                    d.appendChild(bl);
                });
                b.appendChild(d);
            });
        }

        function handleMove(i) {
            if(selectedIdx === null) { if(tubes[i].length > 0) selectedIdx = i; }
            else {
                if(selectedIdx !== i) {
                    let ball = tubes[selectedIdx][tubes[selectedIdx].length-1], target = tubes[i];
                    if(target.length < 4 && (target.length === 0 || target[target.length-1] === ball)) {
                        target.push(tubes[selectedIdx].pop()); selectedIdx = null; checkWin();
                    } else { selectedIdx = i; }
                } else { selectedIdx = null; }
            } render();
        }

        function checkWin() {
            // অরেঞ্জ নিয়ম: প্রতিটি টিউব হয় খালি থাকবে অথবা একই রঙের ৪টি বল থাকবে
            const win = tubes.every(t => t.length === 0 || (t.length === 4 && t.every(b => b === t[0])));
            if(win) {
                active = false; clearInterval(timer);
                const finalScore = 300 - timeLeft;
                if(window.orange) orange.submitScore(finalScore);
                setTimeout(() => { alert("Genius! Puzzle Solved."); }, 300);
            }
        }
    </script>
</body>
</html>
